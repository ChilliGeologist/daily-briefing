<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefing</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4F0;</text></svg>">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-content">
        <div class="header-left">
          <h1>Daily Briefing</h1>
          <p class="date" id="briefing-date"></p>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="btn-pipeline" title="Pipeline status">
            <span class="pipeline-dot" id="pipeline-dot"></span>
          </button>
          <button class="btn-icon" id="btn-settings" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="update-badge hidden" id="update-badge"></span>
          </button>
          <button class="btn-icon" id="btn-archive" title="Archive">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
          </button>
        </div>
      </div>
      <p class="headline" id="briefing-headline"></p>
    </header>

    <div class="suggestion-banner hidden" id="suggestion-banner"></div>

    <div id="archive-panel" class="panel archive-panel hidden">
      <div class="panel-header">
        <h2>Archive</h2>
        <button class="btn-icon" id="btn-close-archive">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="archive-list" class="archive-list"></div>
    </div>

    <div id="settings-panel" class="panel settings-panel hidden">
      <div class="panel-header">
        <h2>Settings</h2>
        <button class="btn-icon" id="btn-close-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-theme">
        <span class="settings-theme-label">Theme</span>
        <div class="theme-switcher" id="theme-switcher">
          <button class="theme-option" data-theme="system" title="System">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            <span>System</span>
          </button>
          <button class="theme-option" data-theme="light" title="Light">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <span>Light</span>
          </button>
          <button class="theme-option" data-theme="dark" title="Dark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span>Dark</span>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-theme-label">Notifications</span>
        <button class="btn-notif-toggle" id="btn-notif-toggle">Enable</button>
        <span class="notif-status" id="notif-status"></span>
      </div>
      <div class="settings-row">
        <span class="settings-theme-label">Install App</span>
        <button class="btn-notif-toggle" id="btn-install">Install</button>
        <span class="notif-status" id="install-status"></span>
      </div>
      <div class="settings-tabs" id="settings-tabs">
        <button class="settings-tab active" data-tab="sources">Sources</button>
        <button class="settings-tab" data-tab="categories">Categories</button>
        <button class="settings-tab" data-tab="preferences">Preferences</button>
        <button class="settings-tab" data-tab="schedule">Schedule</button>
        <button class="settings-tab" data-tab="ollama">Ollama</button>
        <button class="settings-tab" data-tab="updates">Updates</button>
        <button class="settings-tab" data-tab="backup">Backup</button>
        <button class="settings-tab" data-tab="log">Log</button>
      </div>
      <div class="settings-tab-content" id="settings-tab-content"></div>
    </div>

    <div id="pipeline-panel" class="panel pipeline-panel hidden">
      <div class="panel-header">
        <h2>Pipeline</h2>
        <button class="btn-icon" id="btn-close-pipeline">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="pipeline-content"></div>
    </div>

    <main id="sections-container">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading briefing...</p>
      </div>
      <div class="empty-state hidden" id="empty-state">
        <p>No briefing available yet.</p>
        <p class="muted">Run the pipeline or wait for the next scheduled run.</p>
      </div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
